  <style>
    * {

    }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #073b1f, #050505 55%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px;
    }

    .card {

      padding: 28px;
      text-align: center;

    .avatar {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      background: #00ff88;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
      font-size: 34px;
      font-weight: bold;

      font-size: 32px;
      color: #00ff88;
    }

    p {
      margin: 0 0 22px;
      color: #cfcfcf;
    }

    .link {
      display: block;
      text-decoration: none;
      color: white;
      background: #111;
      border: 1px solid #00ff88;
      border-radius: 14px;
      padding: 15px;
      margin: 12px 0;
      font-size: 18px;
      transition: 0.2s;
    }

    .link:hover {
      transform: scale(1.04);
      background: #00ff88;
      color: black;
      font-weight: bold;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
